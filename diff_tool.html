<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משווה קבצים חכם - הצגת תיקון בזמן אמת 15.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .diff-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
        .file-input-container {
            border: 2px dashed #3498db;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            background-color: #ecf0f1;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .file-input-container:hover {
            background-color: #e2e7e9;
        }
        .file-input-container input {
            display: none;
        }
        textarea {
            height: 250px;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: #3498db;
        }
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            padding: 12px 24px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-compare { background-color: #2ecc71; }
        .btn-compare:hover { background-color: #27ae60; }
        .btn-clear { background-color: #e74c3c; }
        .btn-clear:hover { background-color: #c0392b; }
        
        .result-box {
            margin-top: 30px;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
            min-height: 100px;
            line-height: 2.2;
            font-size: 17px;
            white-space: pre-wrap;
            direction: rtl;
            text-align: right;
        }
        
        .diff-match { color: #2c3e50; }
        .diff-delete { background-color: #f8d7da; color: #721c24; text-decoration: line-through; padding: 2px 6px; border-radius: 4px; margin: 0 4px; display: inline-block; font-weight: bold; }
        .diff-insert { background-color: #d4edda; color: #155724; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin: 0 4px; display: inline-block; }
        .status-msg { font-size: 13px; color: #27ae60; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>משווה קבצים חכם - תיקון פיסוק חזותי בתיבה 🔍</h1>
    
    <div class="diff-panels">
        <div class="panel">
            <label>1. קובץ או טקסט מקורי מהלקוח:</label>
            <div class="file-input-container" onclick="document.getElementById('fileOrig').click()">
                <span>גררי או לחצי להעלאת קובץ (Docx, Txt) - אופציונלי</span>
                <input type="file" id="fileOrig" accept=".docx,.txt" onchange="handleFile(this, 'originalText', 'statusOrig')">
                <div id="statusOrig" class="status-msg"></div>
            </div>
            <textarea id="originalText" placeholder="או הדביקי כאן את הטקסט המקורי ידנית..."></textarea>
        </div>
        
        <div class="panel">
            <label>2. טקסט או קובץ מהגרפיקאי (מה-PDF):</label>
            <div class="file-input-container" onclick="document.getElementById('fileGraph').click()">
                <span>גררי או לחצי להעלאת קובץ (Docx, Txt) - אופציונלי</span>
                <input type="file" id="fileGraph" accept=".docx,.txt" onchange="handleFile(this, 'graphicText', 'statusGraph')">
                <div id="statusGraph" class="status-msg"></div>
            </div>
            <textarea id="graphicText" placeholder="הדביקי כאן את הטקסט כפי שהועתק מה-PDF..."></textarea>
        </div>
    </div>
    
    <div class="buttons-wrapper">
        <button class="btn-compare" onclick="compareTexts()">בצע השוואה חכמה</button>
        <button class="btn-clear" onclick="clearAll()">נקה הכל</button>
    </div>
    
    <label>תוצאת ההשוואה המדויקת:</label>
    <div id="result" class="result-box">התוצאה תופיע כאן...</div>
</div>

<script>
function handleFile(input, textareaId, statusId) {
    const file = input.files[0];
    const statusDiv = document.getElementById(statusId);
    if (!file) return;

    statusDiv.style.color = '#27ae60';
    statusDiv.innerText = `🔄 קורא קובץ: ${file.name}...`;
    const reader = new FileReader();

    if (file.name.endsWith('.docx')) {
        reader.onload = function(loadEvent) {
            const arrayBuffer = loadEvent.target.result;
            mammoth.extractRawText({arrayBuffer: arrayBuffer})
                .then(function(result) {
                    document.getElementById(textareaId).value = result.value;
                    statusDiv.innerText = `✅ הקובץ ${file.name} נטען בהצלחה!`;
                });
        };
        reader.readAsArrayBuffer(file);
    } else if (file.name.endsWith('.txt')) {
        reader.onload = function(e) {
            document.getElementById(textareaId).value = e.target.result;
            statusDiv.innerText = `✅ הקובץ ${file.name} נטען בהצלחה!`;
        };
        reader.readAsText(file, 'UTF-8');
    }
}

function normalizeSpacing(text) {
    if (!text) return "";
    let clean = text.replace(/\r?\n|\r/g, ' ');
    return clean.replace(/\s+/g, ' ').trim();
}

// מנוע סידור אקטיבי לפתרון בעיית הפיסוק במספרים
function activeBiDiPunctuationFix(text) {
    if (!text) return "";
    
    // 1. תיקון סימן פיסוק שמופיע בתחילת מספר במקום בסופו (למשל: ,2022 הופך ל-2022,)
    let fixed = text.replace(/([.,;:!\?])([0-9]+)/g, '$2$1');
    
    // 2. תיקון סימן פיסוק שמופיע בסוף מספר במקום בתחילתו
    fixed = fixed.replace(/([0-9]+)([.,;:!\?])\s([\u0590-\u05fe])/g, '$1$2 $3');
    
    // 3. תיקון סוגריים הפוכים מסביב למספרים (למשל: (2022) שמתהפך בהעתקה)
    fixed = fixed.replace(/(\))([0-9]+)(\()/g, '($2)');
    
    return fixed;
}

function professionalWordDiff(text1, text2) {
    const words1 = text1.split(' ').filter(w => w.length > 0);
    const words2 = text2.split(' ').filter(w => w.length > 0);
    
    let memo = Array(words1.length + 1).fill().map(() => Array(words2.length + 1).fill(0));
    
    for (let i = 1; i <= words1.length; i++) {
        for (let j = 1; j <= words2.length; j++) {
            if (words1[i - 1] === words2[j - 1]) {
                memo[i][j] = memo[i - 1][j - 1] + 1;
            } else {
                memo[i][j] = Math.max(memo[i - 1][j], memo[i][j - 1]);
            }
        }
    }
    
    let i = words1.length, j = words2.length;
    let result = [];
    
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && words1[i - 1] === words2[j - 1]) {
            result.unshift({ type: 0, text: words1[i - 1] });
            i--;
            j--;
        } else if (j > 0 && (i === 0 || memo[i][j - 1] >= memo[i - 1][j])) {
            result.unshift({ type: 1, text: words2[j - 1] });
            j--;
        } else {
            result.unshift({ type: -1, text: words1[i - 1] });
            i--;
        }
    }
    return result;
}

function compareTexts() {
    // שליפת הטקסטים הנוכחיים מהתיבות
    let origInput = document.getElementById('originalText').value;
    let graphInput = document.getElementById('graphicText').value;
    
    // ניקוי רווחים ראשוני
    let cleanOrig = normalizeSpacing(origInput);
    let cleanGraph = normalizeSpacing(graphInput);
    
    // הרצת מנוע תיקון הפיסוק הלוגי
    cleanOrig = activeBiDiPunctuationFix(cleanOrig);
    cleanGraph = activeBiDiPunctuationFix(cleanGraph);
    
    // השינוי המרכזי: עדכון תיבות הטקסט על המסך כדי שהמשתמש יראה את התיקון בפועל!
    document.getElementById('originalText').value = cleanOrig;
    document.getElementById('graphicText').value = cleanGraph;
    
    const resultDiv = document.getElementById('result');
    
    if (!cleanOrig && !cleanGraph) {
        resultDiv.innerHTML = 'אנא הדביקי או טעני טקסטים להשוואה.';
        return;
    }
    
    // הרצת ה-Diff
    const diffs = professionalWordDiff(cleanOrig, cleanGraph);
    
    let outputHTML = '';
    let hasDifferences = false;
    
    diffs.forEach((part) => {
        if (part.type === 0) {
            outputHTML += `<span class="diff-match">${part.text}</span> `;
        } else if (part.type === -1) {
            hasDifferences = true;
            outputHTML += `<span class="diff-delete">${part.text}</span> `;
        } else if (part.type === 1) {
            hasDifferences = true;
            outputHTML += `<span class="diff-insert">${part.text}</span> `;
        }
    });
    
    if (!hasDifferences) {
        resultDiv.innerHTML = '<span style="color: #27ae60; font-weight: bold; font-size: 18px;">✅ הטקסטים זהים לחלוטין! הפיסוק תוקן אוטומטית בתיבות והכל תואם.</span>';
    } else {
        resultDiv.innerHTML = outputHTML;
    }
}

function clearAll() {
    document.getElementById('originalText').value = '';
    document.getElementById('graphicText').value = '';
    document.getElementById('fileOrig').value = '';
    document.getElementById('fileGraph').value = '';
    document.getElementById('statusOrig').innerText = '';
    document.getElementById('statusGraph').innerText = '';
    document.getElementById('result').innerHTML = 'התוצאה תופיע כאן...';
}
</script>

</body>
</html>
